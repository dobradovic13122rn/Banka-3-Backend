syntax = "proto3";

package exchange;

option go_package = "github.com/RAF-SI-2025/Banka-3-Backend/gen/exchange";

service ExchangeService {
  rpc GetExchangeRates(ExchangeRateListRequest) returns (ExchangeRateListResponse);
  rpc ConvertMoney(ConversionRequest) returns (ConversionResponse);
}

message CurrencyRate {
  string code = 1;
  double rate = 2;
}

message ExchangeRateListRequest {}

message ExchangeRateListResponse {
  repeated CurrencyRate rates = 1;
  int64 last_updated = 2;
}

message ConversionRequest {
  string from_currency = 1;
  string to_currency = 2;
  double amount = 3;
}

message ConversionResponse {
  double converted_amount = 1;
  double exchange_rate = 2;
}

