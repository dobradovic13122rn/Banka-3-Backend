syntax = "proto3";

package user;

option go_package = "github.com/RAF-SI-2025/Banka-3-Backend/gen/user";

service UserService {
  rpc GetEmployeeById(GetEmployeeByIdRequest) returns (GetEmployeeByIdResponse);
  rpc GetEmployees(GetEmployeesRequest) returns (GetEmployeesResponse);
  rpc UpdateEmployee(UpdateEmployeeRequest) returns (UpdateEmployeeResponse);
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc Logout(LogoutRequest) returns (LogoutResponse);
  rpc Refresh(RefreshRequest) returns (RefreshResponse);
  rpc ValidateAccessToken(ValidateTokenRequest) returns (ValidateTokenResponse);
  rpc ValidateRefreshToken(ValidateTokenRequest) returns (ValidateTokenResponse);
  rpc RequestPasswordReset(PasswordActionRequest) returns (PasswordActionResponse);
  rpc RequestInitialPasswordSet(PasswordActionRequest) returns (PasswordActionResponse);
  rpc SetPasswordWithToken(SetPasswordWithTokenRequest) returns (SetPasswordWithTokenResponse);
  rpc CreateClientAccount(CreateClientRequest) returns (CreateClientResponse);
  rpc CreateEmployeeAccount(CreateEmployeeRequest) returns (CreateEmployeeResponse);
}

message ValidateTokenRequest {
  string token = 1;
}

message ValidateTokenResponse {
  bool valid = 1;
}

message RefreshRequest {
  string refresh_token = 1;
}

message RefreshResponse {
  string access_token = 1;
  string refresh_token = 2;
}


message EmployeeResponse {
  int64 id = 1;
  string first_name = 2;
  string last_name = 3;
  string email = 4;
  string position = 5;
  bool active = 6;
}

message LogoutRequest {
  string email = 1;
}

message LogoutResponse {
  bool success = 1;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message LoginResponse {
  string accessToken = 1;
  string refreshToken = 2;
}

message PasswordActionRequest {
  string email = 1;
}

message PasswordActionResponse {
  bool accepted = 1;
}

message SetPasswordWithTokenRequest {
  string token = 1;
  string new_password = 2;
}

message SetPasswordWithTokenResponse {
  bool successful = 1;
}

message Permissions{
  int64 Id = 1;
  string Permision = 2;
}

message CreateEmployeeRequest{
  string FirstName = 1;
  string Last_name = 2;
  int64 DateOfBirth = 3;
  string Gender = 4;
  string Email = 5;
  string PhoneNumber = 6;
  string Address = 7;
  string Username = 8;
  string Position = 9;
  string Department = 10;
  string password = 11;
}

message CreateEmployeeResponse {
  bool valid = 1;
}

message CreateClientRequest {
  string FirstName = 1;
  string Last_name = 2;
  int64 DateOfBirth = 3;
  string Gender = 4;
  string Email = 5;
  string PhoneNumber = 6;
  string Address = 7;
  string password = 8;
}

message CreateClientResponse {
  bool valid = 1;
}


message GetEmployeesRequest{
  string FirstName = 1;
  string LastName = 2;
  string Email = 3;
  string Position = 4;
  
}

message GetEmployeesResponse{
  message Employee{
    int64 Id = 1;
    string FirstName = 2;
    string LastName = 3;
    string Email = 4;
    string Position = 5;
    string PhoneNumber = 6;
    bool active = 8;
    Permissions perms = 9;
  }
  repeated Employee Employees = 1;
}

message GetEmployeeByIdRequest {
  int64 id = 1;
}

message GetEmployeeByIdResponse{
  int64 Id = 1;
  string FirstName = 2;
  string LastName = 3;
  int64 DateOfBirth = 4;
  string Gender = 5;
  string Email = 6;
  string PhoneNumber = 7;
  string Address = 8;
  string Username = 9;
  string Position = 10;
  string department = 11;
  bool active = 12;
  Permissions perms = 13;
}

message UpdateEmployeeRequest{
  int64 Id = 1;
  string LastName = 2;
  string Gender = 3;
  string PhoneNumber = 4;
  string Address = 5;
  string Position = 6;
  string Department = 7;
  bool active = 8;
  repeated Permissions perms = 9;
}

message UpdateEmployeeResponse{
  bool Valid = 1;
  string response = 2;
}
